{% extends "base.html" %}
{% block title %}Login - {{ app_name }}{% endblock %}

{% block content_login %}
<div class="login-box">
  <div class="login-logo">
    <span class="icon">🎓</span>
    <h2>{{ app_name }}</h2>
    <p>Academic Progress Communication System</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input type="email" class="form-control" id="email" name="email"
             placeholder="counselor@rmkcet.ac.in" required autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Enter your password" required>
        <button type="button" class="toggle-pw"
                onclick="togglePassword()"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;">
          <i class="fas fa-eye" id="pwIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:8px;">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
  </form>

  <div style="margin-top:24px;text-align:center;">
    <p style="font-size:.78rem;color:var(--text-muted);">
      v{{ app_version }} &nbsp;|&nbsp; RMK College of Engineering and Technology
    </p>
  </div>
</div>

<script>
function togglePassword() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('pwIcon');
  if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; ico.className = 'fas fa-eye'; }
}
</script>
{% endblock %}
